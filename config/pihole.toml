
# Pi-hole v6 Enterprise Configuration Specification
# Consolidated Platform State Backup

[dns]
  # Active local network interface criteria
  interface = "eth0"
  
  # Upstream DNS Forwarding Resolvers
  upstreams = [
    "1.1.1.1",
    "1.0.0.1"
  ]
  
  # Active Logging State
  queryLogging = true

[dns.blocking]
  # Network-wide domain ad-sinkhole status
  active = true

[webserver]
  # Port binding for administration panel interface
  port = "80"
