# systemd-journald Storage Optimization Specification
# Purpose: Protect physical micro-SD card lifecycles by shifting system logging behavior

[Journal]
# Force all logs to live purely in temporary volatile RAM instead of writing to disk
Storage=volatile

# Hard cap memory logs to a maximum footprint of 64 Megabytes
RuntimeMaxUse=64M

# Disable forwarding metrics to the legacy syslog daemon to eliminate redundant I/O bottlenecks
ForwardToSyslog=no
